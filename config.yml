# ==========================================
# OBSA 插件快照特性自动化测试框架配置
# ==========================================

global:
  log_level: "INFO"
  log_dir: "/var/log/obsa_test"
  max_workers: 10
  global_timeout_sec: 7200
  dry_run: false
  mock_obsa_mode: true  # 实测模式

cluster_env:
  # HDFS 侧基准路径 (纯 HDFS 侧，用于对照组)
  hdfs_base_uri: "hdfs://namenode:8020/native_obsa_test"
  
  # OBS 侧数据路径 (原生协议，供 createSnapshot / put 等使用)
  # 对应 core-site.xml 里的真实桶
  obs_base_uri: "obs://posix-obsa-snap/obsa/obsa_test_workspace"
  
  # OBS 侧管理路径 (HDFS 协议，供 allowSnapshot 使用)
  # 对应 core-site.xml: hdfs://localhost:9000/hadoop -> obs://posix-obsa-snap/obsa
  obs_admin_uri: "hdfs://namenode:8020/hadoop/obsa_test_workspace"
  
  obsa_cli_path: "hdfs"
  obs_endpoint: "obs.bcm-region.myhuaweicloud.com"

data_model:
  file_size_kb: 1024
  file_count: 50
  directory_depth: 3
  enable_md5_baseline: true
  baseline_export_path: "./output/baseline.json"

snapshot_test:
  prefix: "auto_snap_"
  max_snapshots_per_dir: 10
  wait_after_create_sec: 5
  verification:
    strict_metadata_check: true
    retry_count: 3
    retry_interval_sec: 10